<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Spooky Mansion</title>
	<style>
		body {
			margin: 0;
			background: #000;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}
		img {
			max-width: 100%;
			height: auto;
			display: block;
		}

		.background-container {
			position: relative;
		}

		.corner-spider {
			position: absolute;
			top: 15vh;
			left: 100px;
			width: 120px;
			height: auto;
			z-index: 10;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<audio id="bg-audio" src="Audio/SpookyMansion.mp3"></audio>
	<div class="background-container">
		<img class="corner-spider" id="spider-img" src="Images/Spider.png" alt="Spider">
		<img src="Images/spookymansion.jpg" alt="Spooky Mansion">
	</div>
	<script>
		const bgAudio = document.getElementById('bg-audio');
		const spiderImg = document.getElementById('spider-img');
		
		// Play audio and redirect when spider is clicked
		spiderImg.addEventListener('click', () => {
			bgAudio.play().catch(error => console.log("Autoplay blocked or error occurred."));
		});

		// Navigate to Myspace when audio ends
		bgAudio.addEventListener('ended', () => {
			window.location.href = 'myspace/Myspace.html';
		});
	</script>
</body>
</html>
