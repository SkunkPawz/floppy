<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry man wants to fight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: white url('Images/background.gif') center/cover no-repeat fixed;
        }

        .image-container {
            position: fixed;
            width: 120px;
            height: 120px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-container:hover {
            transform: scale(1.1);
        }

        .scared {
            width: 250px !important;
            height: 250px !important;
            z-index: 1000 !important;
            filter: drop-shadow(0 0 20px #ff0000) brightness(1.2) !important;
        }

        @keyframes scaremovement {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(var(--x1, 100px), var(--y1, 100px));
            }
            50% {
                transform: translate(var(--x2, -100px), var(--y2, 50px));
            }
            75% {
                transform: translate(var(--x3, 80px), var(--y3, -80px));
            }
        }

        .floating {
            animation: float linear infinite;
        }

        #playButton {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 30px 60px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: 4px solid #ffff00;
            border-radius: 20px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        #playButton:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #playButton:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
</head>
<body>
    <button id="playButton">click me</button>
    
    <audio id="bgAudio" loop>
        <source src="Audio/thehallway.mp3" type="audio/mpeg">

        class BouncingImage {
            constructor(src) {
                this.img = document.createElement('img');
                this.img.src = `Images/${src}`;
                this.img.className = 'image-container';
                
                this.width = 120;
                this.height = 120;
                this.x = Math.random() * (window.innerWidth - this.width);
                this.y = Math.random() * (window.innerHeight - this.height);
                this.vx = (Math.random() - 0.5) * 8; // velocity x
                this.vy = (Math.random() - 0.5) * 8; // velocity y
                
                this.img.style.left = this.x + 'px';
                this.img.style.top = this.y + 'px';
                
                this.img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    
                    // Play click sound
                    const clickAudio = document.getElementById('clickSound');
                    clickAudio.currentTime = 0;
                    clickAudio.play().catch(err => console.log('Click sound play failed:', err));
                    
                    if (!this.img.classList.contains('scared')) {
                        this.img.classList.add('scared');
                        this.img.style.animation = `scaremovement 0.2s infinite`;
                        
                        setTimeout(() => {
                            this.img.classList.remove('scared');
                            this.img.style.animation = 'none';
                        }, 2000);
                    }
                });
                
                document.body.appendChild(this.img);
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // Bounce off right/left walls
                if (this.x + this.width >= window.innerWidth || this.x <= 0) {
                    this.vx *= -1;
                    this.x = Math.max(0, Math.min(this.x, window.innerWidth - this.width));
                }
                
                // Bounce off bottom/top walls
                if (this.y + this.height >= window.innerHeight || this.y <= 0) {
                    this.vy *= -1;
                    this.y = Math.max(0, Math.min(this.y, window.innerHeight - this.height));
                }
                
                this.img.style.left = this.x + 'px';
                this.img.style.top = this.y + 'px';
            }
        }
        
        const bouncingImages = images.map(src => new BouncingImage(src));
        
        function animate() {
            bouncingImages.forEach(obj => obj.update());
            requestAnimationFrame(animate);
        }
        
        // Play audio on button click
        const playButton = document.getElementById('playButton');
        playButton.addEventListener('click', (e) => {
            e.stopPropagation();
            const audio = document.getElementById('bgAudio');
            audio.play().catch(e => console.log('Audio play failed:', e));
            playButton.style.display = 'none';
        });
        
        animate();
    </script>
